syntax = "proto3";

package gitchat.v1;

option go_package = "github.com/pders01/git-chat/gen/go/gitchat/v1;gitchatv1";

// ChatService owns conversations against a git repository. All RPCs are
// scoped by the authenticated principal: a user only sees their own
// sessions, never someone else's on the same server.
//
// The streaming shape is deliberately narrow in M3. Diff references
// (MessageChunk.diff) arrive in M4, knowledge-card fast-path hits
// (MessageChunk.card_hit) arrive in M5. The oneof is already declared so
// the client's exhaustive switch can grow without breaking the wire
// contract.
service ChatService {
  // ListSessions returns every chat session for the authenticated
  // principal, newest first. Does not include message bodies — use
  // GetSession to fetch the transcript of a specific session.
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);

  // GetSession returns the full transcript of one session.
  rpc GetSession(GetSessionRequest) returns (GetSessionResponse);

  // SendMessage appends a user message to a session (creating the session
  // if session_id is empty) and streams the assistant reply back one
  // MessageChunk at a time. The final chunk is always Done, carrying
  // usage stats and the persisted session / message IDs.
  rpc SendMessage(SendMessageRequest) returns (stream MessageChunk);

  // Search performs a unified search across KB cards and chat messages.
  rpc Search(SearchRequest) returns (SearchResponse);

  // RenameSession updates a session's title.
  rpc RenameSession(RenameSessionRequest) returns (RenameSessionResponse);

  // DeleteSession removes a session and cascades to its messages.
  rpc DeleteSession(DeleteSessionRequest) returns (DeleteSessionResponse);

  // PinSession toggles the pinned/starred state of a session.
  rpc PinSession(PinSessionRequest) returns (PinSessionResponse);

  // ListCards returns all knowledge cards for a repository.
  rpc ListCards(ListCardsRequest) returns (ListCardsResponse);

  // DeleteCard removes a knowledge card by ID.
  rpc DeleteCard(DeleteCardRequest) returns (DeleteCardResponse);

  // GetCard returns the full detail of a single knowledge card, including
  // provenance (file dependencies).
  rpc GetCard(GetCardRequest) returns (GetCardResponse);

  // SummarizeActivity returns an LLM-generated summary of recent repo
  // activity for the chat dashboard.
  rpc SummarizeActivity(SummarizeActivityRequest) returns (SummarizeActivityResponse);
}

// ─── Search ─────────────────────────────────────────────────────────────
message SearchRequest {
  string query = 1;
  string repo_id = 2;
  int32 limit = 3;
}

message SearchResponse {
  repeated SearchHit hits = 1;
}

message SearchHit {
  string source = 1;
  string id = 2;
  string title = 3;
  string body = 4;
}

// ─── Session & Message ──────────────────────────────────────────────────

message ChatSession {
  string id = 1;
  string repo_id = 2;
  string title = 3;         // auto-generated from first message
  int64 created_at = 4;     // unix seconds
  int64 updated_at = 5;
  int32 message_count = 6;
  bool pinned = 7;
}

// Role mirrors the OpenAI chat completions roles for wire-level
// simplicity. We do not expose `tool` because tool use is a higher-level
// concept that lives in the LLM adapter, not in the wire protocol.
enum MessageRole {
  MESSAGE_ROLE_UNSPECIFIED = 0;
  MESSAGE_ROLE_USER = 1;
  MESSAGE_ROLE_ASSISTANT = 2;
  MESSAGE_ROLE_SYSTEM = 3;
}

message ChatMessage {
  string id = 1;
  string session_id = 2;
  MessageRole role = 3;
  string content = 4;         // full markdown body
  string model = 5;           // e.g. "gemma-4-e4b-it"; empty for user turns
  int32 token_count_in = 6;
  int32 token_count_out = 7;
  int64 created_at = 8;
}

// ─── ListSessions ───────────────────────────────────────────────────────
message ListSessionsRequest {
  string repo_id = 1;   // required: scope to one repo
}

message ListSessionsResponse {
  repeated ChatSession sessions = 1;
}

// ─── GetSession ─────────────────────────────────────────────────────────
message GetSessionRequest {
  string session_id = 1;
}

message GetSessionResponse {
  ChatSession session = 1;
  repeated ChatMessage messages = 2;
}

// ─── SendMessage ────────────────────────────────────────────────────────
message SendMessageRequest {
  // Empty session_id starts a new session in repo_id. If session_id is
  // non-empty, repo_id is ignored (the session already knows its repo).
  string session_id = 1;
  string repo_id = 2;
  string text = 3;
  // Edit / regenerate hook. When non-empty, the server deletes this
  // message and every message after it from the session before
  // appending `text` as a new user turn. Covers two UX flows:
  //   - Edit a user message: client sends replace_from_message_id =
  //     old user id, text = new user text. Old pair gets replaced.
  //   - Regenerate an assistant response: client sends
  //     replace_from_message_id = preceding user id, text = same
  //     preceding user text. The old user+assistant pair is dropped
  //     and a fresh turn runs against identical input.
  string replace_from_message_id = 4;
}

// MessageChunk is the server-streamed response shape. Exactly one chunk
// per call carries Done; subclient code should terminate on that marker.
message MessageChunk {
  oneof kind {
    string token = 1;     // incremental assistant text
    Done done = 2;        // terminal chunk, always present
    // M5: fast-path answer from the knowledge base, bypassing the LLM.
    // Sent as a single chunk before Done when a valid card matches.
    KnowledgeCardHit card_hit = 3;
    // Sent once, before any tokens, with the canonical ID the server
    // just assigned to the user turn. Lets the client learn the ID
    // even when the stream errors before Done, so retry-after-error
    // can pass it via replace_from_message_id to truncate the
    // failed pair instead of creating a duplicate.
    Started started = 4;
  }
}

message Started {
  string user_message_id = 1;
  string session_id = 2;  // non-empty on first turn of a new session
}

// KnowledgeCardHit carries a cached answer from the knowledge base.
// The client renders it like an assistant turn but with a visual badge
// indicating it came from cache, not a fresh LLM call.
message KnowledgeCardHit {
  string card_id = 1;
  string answer_md = 2;     // the frozen markdown answer
  string model = 3;         // which model originally produced it
  int32  hit_count = 4;     // how many times this card has been served
  string created_commit = 5; // HEAD SHA when the card was derived
}

message Done {
  // Canonical IDs once the turn has been persisted.
  string session_id = 1;
  string user_message_id = 2;
  string assistant_message_id = 3;

  // Usage metadata.
  int32 token_count_in = 4;
  int32 token_count_out = 5;
  string model = 6;

  // Optional error surface: non-empty `error` means the assistant turn
  // failed mid-stream. The partial content sent up to that point has still
  // been persisted for debuggability.
  string error = 7;
}

// ─── RenameSession ──────────────────────────────────────────────────────
message RenameSessionRequest {
  string session_id = 1;
  string title = 2;
}

message RenameSessionResponse {}

// ─── DeleteSession ──────────────────────────────────────────────────────
message DeleteSessionRequest {
  string session_id = 1;
}

message DeleteSessionResponse {}

// ─── PinSession ─────────────────────────────────────────────────────────
message PinSessionRequest {
  string session_id = 1;
  bool pinned = 2;
}

message PinSessionResponse {}

// ─── ListCards ──────────────────────────────────────────────────────
message ListCardsRequest {
  string repo_id = 1;
}

message KBCard {
  string id = 1;
  string question = 2;
  string answer_preview = 3;  // first 200 chars of answer_md
  string model = 4;
  string created_by = 5;
  int32 hit_count = 6;
  int64 created_at = 7;
  bool invalidated = 8;
}

message ListCardsResponse {
  repeated KBCard cards = 1;
}

// ─── DeleteCard ─────────────────────────────────────────────────────
message DeleteCardRequest {
  string card_id = 1;
}

message DeleteCardResponse {}

// ─── GetCard ────────────────────────────────────────────────────────
message GetCardRequest {
  string card_id = 1;
}

message CardProvenance {
  string path = 1;
  string blob_sha = 2;
}

message GetCardResponse {
  string id = 1;
  string question = 2;
  string answer_md = 3;
  string model = 4;
  string created_by = 5;
  int32 hit_count = 6;
  int64 created_at = 7;
  bool invalidated = 8;
  string created_commit = 9;
  repeated CardProvenance provenance = 10;
}

// ─── SummarizeActivity ────────────────────────────────────────────────
message SummarizeActivityRequest {
  string repo_id = 1;
}

message SummarizeActivityResponse {
  string summary = 1;            // LLM-generated prose summary
  repeated string suggestions = 2; // 2-3 contextual question suggestions
}
