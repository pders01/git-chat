syntax = "proto3";

package gitchat.v1;

option go_package = "github.com/pders01/git-chat/gen/go/gitchat/v1;gitchatv1";

// RepoService owns read-only access to the git repositories this server
// manages. Writes (chat, KB updates) live on other services; this one is
// intentionally a narrow window into git state.
//
// All RPCs require an authenticated session. The gateway interceptor
// returns CodeUnauthenticated before the handler runs if the caller has
// no principal in context.
service RepoService {
  // ListRepos returns every repository the server has been configured to
  // expose. In M2 this is populated from `--repo` flags (serve) or the
  // positional argument to `git-chat local`.
  rpc ListRepos(ListReposRequest) returns (ListReposResponse);

  // ListBranches returns the local branches of a repository. Ordered by
  // committer time (most-recent first) so the default selection is the
  // most active branch.
  rpc ListBranches(ListBranchesRequest) returns (ListBranchesResponse);

  // ListTree returns directory entries at a given path under a given ref.
  // `path` is the slash-separated directory path; empty string means the
  // repository root.
  rpc ListTree(ListTreeRequest) returns (ListTreeResponse);

  // GetFile returns the contents of a blob at a given path under a given
  // ref. Files larger than max_bytes are returned with content truncated
  // and truncated=true so the UI can show a partial view.
  rpc GetFile(GetFileRequest) returns (GetFileResponse);

  // ListCommits returns recent commits on a branch, newest first.
  // Used by the commit-log view (third tab alongside chat and browse).
  rpc ListCommits(ListCommitsRequest) returns (ListCommitsResponse);

  // GetBlame returns per-line author attribution for a file at a given ref.
  rpc GetBlame(GetBlameRequest) returns (GetBlameResponse);

  // CompareBranches returns the list of files changed between two refs.
  rpc CompareBranches(CompareBranchesRequest) returns (CompareBranchesResponse);

  // GetDiff returns a unified diff for a single file between two refs.
  // Introduced in M4 as the backend for chat-embedded diff primitives:
  // the LLM emits `[[diff from=X to=Y path=Z]]` markers in its prose,
  // the client detects them and calls this RPC to pull actual content.
  //
  // Empty from_ref defaults to the parent of to_ref (i.e. "what did
  // this commit change to this file"). Empty to_ref defaults to HEAD.
  // The returned diff is a plain text unified patch suitable for
  // Shiki's `diff` grammar or the @pierre/diffs renderer.
  rpc GetDiff(GetDiffRequest) returns (GetDiffResponse);

  // GetStatus returns the working tree status: staged, unstaged, and
  // untracked files. Diffs are fetched separately via GetWorkingTreeDiff.
  rpc GetStatus(GetStatusRequest) returns (GetStatusResponse);

  // GetWorkingTreeDiff returns a unified diff between HEAD and the
  // working tree for a single file.
  rpc GetWorkingTreeDiff(GetWorkingTreeDiffRequest) returns (GetWorkingTreeDiffResponse);

  // GetFileChurnMap returns per-file commit counts, additions, deletions,
  // last modified timestamp, and file size over a time window.
  rpc GetFileChurnMap(GetFileChurnMapRequest) returns (GetFileChurnMapResponse);

  // GetConfig returns all registered configuration entries with their
  // resolved values (SQLite override → env var → compiled default).
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);

  // UpdateConfig writes a configuration override into SQLite. The new
  // value takes effect immediately for future Get() calls.
  rpc UpdateConfig(UpdateConfigRequest) returns (UpdateConfigResponse);

  // Provider/model catalog from catwalk. Returns cached data (no network).
  rpc GetProviderCatalog(GetProviderCatalogRequest) returns (GetProviderCatalogResponse);
  // Fetch latest catalog from catwalk.charm.sh (user-triggered, opt-in).
  rpc RefreshProviderCatalog(RefreshProviderCatalogRequest) returns (GetProviderCatalogResponse);

  // Discover OpenAI-compatible endpoints on localhost (user-triggered, opt-in).
  rpc DiscoverLocalEndpoints(DiscoverLocalEndpointsRequest) returns (DiscoverLocalEndpointsResponse);
  // Discover models available at any base URL (probes GET /models with optional API key).
  rpc DiscoverModels(DiscoverModelsRequest) returns (DiscoverModelsResponse);

  // LLM profile management.
  rpc ListProfiles(ListProfilesRequest) returns (ListProfilesResponse);
  rpc SaveProfile(SaveProfileRequest) returns (SaveProfileResponse);
  rpc DeleteProfile(DeleteProfileRequest) returns (DeleteProfileResponse);
  rpc ActivateProfile(ActivateProfileRequest) returns (ActivateProfileResponse);
}

// ─── Repo ───────────────────────────────────────────────────────────────
message Repo {
  string id = 1;              // stable slug (default: basename of path)
  string label = 2;           // display name
  string default_branch = 3;  // e.g. "main" or "master"
  string head_commit = 4;     // short SHA at HEAD
}

// ─── ListRepos ──────────────────────────────────────────────────────────
message ListReposRequest {}

message ListReposResponse {
  repeated Repo repos = 1;
}

// ─── ListBranches ───────────────────────────────────────────────────────
message ListBranchesRequest {
  string repo_id = 1;
}

message ListBranchesResponse {
  repeated Branch branches = 1;
  repeated Branch tags = 2;    // tags reuse Branch shape (name, commit SHA, time, subject)
}

message Branch {
  string name = 1;
  string commit = 2;          // full SHA
  int64 committer_time = 3;   // unix seconds
  string subject = 4;         // first line of the commit message
}

// ─── ListTree ───────────────────────────────────────────────────────────
message ListTreeRequest {
  string repo_id = 1;
  string ref = 2;   // branch name or SHA; empty = default branch
  string path = 3;  // directory path; empty = repo root
}

message ListTreeResponse {
  repeated TreeEntry entries = 1;
  string ref_resolved = 2;  // the actual SHA that was used
}

message TreeEntry {
  string name = 1;
  EntryType type = 2;
  int64 size = 3;      // bytes; 0 for directories
  string blob_sha = 4; // empty for directories
}

enum EntryType {
  ENTRY_TYPE_UNSPECIFIED = 0;
  ENTRY_TYPE_FILE = 1;
  ENTRY_TYPE_DIR = 2;
  ENTRY_TYPE_SYMLINK = 3;
  ENTRY_TYPE_SUBMODULE = 4;
}

// ─── GetFile ────────────────────────────────────────────────────────────
message GetFileRequest {
  string repo_id = 1;
  string ref = 2;        // branch name or SHA; empty = default branch
  string path = 3;       // file path
  int64 max_bytes = 4;   // truncation threshold; 0 = 512 KiB default
}

message GetFileResponse {
  bytes content = 1;
  int64 size = 2;       // full blob size in bytes
  bool truncated = 3;   // true if content was cut off at max_bytes
  bool is_binary = 4;   // heuristic flag; content still returned
  string blob_sha = 5;
  string language = 6;  // shiki/highlight grammar name (by extension)
}

// ─── ListCommits ────────────────────────────────────────────────────────
message ListCommitsRequest {
  string repo_id = 1;
  string ref = 2;       // branch/SHA; empty = default branch
  int32  limit = 3;     // max commits to return; 0 = 50
  int32  offset = 4;    // pagination offset
  string path = 5;      // filter to commits that touched this file path
}

message ListCommitsResponse {
  repeated CommitEntry commits = 1;
  bool has_more = 2;    // true if more commits exist beyond limit+offset
}

message CommitEntry {
  string sha = 1;             // full SHA
  string short_sha = 2;       // 7-char abbreviated
  string message = 3;         // first line only (subject)
  string author_name = 4;
  string author_email = 5;
  int64  author_time = 6;     // unix seconds
  int32  files_changed = 7;   // number of files touched
  int32  additions = 8;       // total lines added
  int32  deletions = 9;       // total lines removed
  string body = 10;           // full commit body (after subject + blank line)
  repeated string parent_shas = 11;  // parent commit SHAs (for graph rendering)
}

// ─── GetBlame ───────────────────────────────────────────────────────────
message GetBlameRequest {
  string repo_id = 1;
  string ref = 2;      // empty = HEAD
  string path = 3;
}

message GetBlameResponse {
  repeated BlameLine lines = 1;
}

message BlameLine {
  string text = 1;
  string author_name = 2;
  string author_email = 3;
  int64  date = 4;          // unix seconds
  string commit_sha = 5;    // short SHA of the introducing commit
  string commit_message = 6; // first line of the commit message
}

// ─── CompareBranches ────────────────────────────────────────────────────
message CompareBranchesRequest {
  string repo_id = 1;
  string base_ref = 2;   // e.g. "main"
  string head_ref = 3;   // e.g. "feature-branch"
  // detect_renames: when true, the server runs rename detection
  // (similarity matrix over all added+deleted blobs). Expensive on
  // wide diffs — clients set this on a second, background request
  // after the initial fast render has landed.
  bool detect_renames = 4;
}

message CompareBranchesResponse {
  repeated ChangedFile files = 1;
  int32 total_additions = 2;
  int32 total_deletions = 3;
}

message ChangedFile {
  string path = 1;
  string status = 2;     // "added", "modified", "deleted", "renamed"
  int32 additions = 3;
  int32 deletions = 4;
  // from_path is the pre-rename filename when status="renamed". Only
  // populated on responses where the request opted into rename
  // detection; path carries the post-rename name.
  string from_path = 5;
}

// ─── GetDiff ────────────────────────────────────────────────────────────
message GetDiffRequest {
  string repo_id = 1;
  string from_ref = 2;  // branch/SHA; empty = parent of to_ref
  string to_ref = 3;    // branch/SHA; empty = HEAD
  string path = 4;      // file path on the to side (required)
  // detect_renames: same semantics as on CompareBranchesRequest.
  // Only affects the whole-commit (path="") response; single-file
  // diffs don't care about renames.
  bool detect_renames = 5;
  // from_path: path on the from side when the file was renamed
  // between from_ref and to_ref. Empty means same as `path`.
  // Without this hint the server reads the from-side under `path`,
  // which doesn't exist for a rename and silently collapses the
  // diff to add-only.
  string from_path = 6;
  // full_range: when true, skip the file-count and patch-byte caps
  // that normally protect us from rendering huge branch-vs-branch
  // diffs. Set by callers who picked an explicit range (compare-view)
  // and need the complete diff. Per-file stats are always accurate
  // regardless of this flag.
  bool full_range = 7;
}

message GetDiffResponse {
  string unified_diff = 1;  // `diff --git` style unified patch
  string from_commit = 2;   // resolved from_ref
  string to_commit = 3;     // resolved to_ref
  bool   empty = 4;         // true if the file is unchanged between refs
  repeated ChangedFile files = 5;  // per-file metadata (whole-commit diffs only)
}

// ─── GetStatus ──────────────────────────────────────────────────────────
message GetStatusRequest {
  string repo_id = 1;
}

message GetStatusResponse {
  repeated StatusFile staged = 1;
  repeated StatusFile unstaged = 2;
  repeated StatusFile untracked = 3;
}

message StatusFile {
  string path = 1;
  string status = 2;  // "added", "modified", "deleted", "copied"
}

// ─── GetWorkingTreeDiff ─────────────────────────────────────────────────
message GetWorkingTreeDiffRequest {
  string repo_id = 1;
  string path = 2;      // file path (required)
}

message GetWorkingTreeDiffResponse {
  string unified_diff = 1;
  bool   empty = 2;
}

// ─── Config ────────────────────────────────────────────────────────────
message GetConfigRequest {}

message ConfigEntry {
  string key = 1;
  string value = 2;
  string default_value = 3;
  string description = 4;
  string group = 5;
  bool   secret = 6;
}

message GetConfigResponse {
  repeated ConfigEntry entries = 1;
}

message UpdateConfigRequest {
  string key = 1;
  string value = 2;
}

message UpdateConfigResponse {}

// ─── GetFileChurnMap ────────────────────────────────────────────────────
message GetFileChurnMapRequest {
  string repo_id = 1;
  string ref = 2;
  int64 since_timestamp = 3;
  int64 until_timestamp = 4;
  // Per-request override for the commit scan cap. Zero means "use the
  // server default" (GITCHAT_MAX_CHURN_COMMITS). Non-zero is clamped
  // against a hard safety ceiling on the server so a misbehaving
  // client can't ask for a trillion commits. The frontend sends a
  // large value when the user explicitly picks "all history" so those
  // stats aren't capped at 5k on a 60k-commit repo.
  int32 max_commits = 5;
}

message FileChurn {
  string path = 1;
  int32 commit_count = 2;
  int64 total_additions = 3;
  int64 total_deletions = 4;
  int64 last_modified = 5;
  int64 size = 6;
  // Most-frequent author across the churn window for this file.
  // Populated when GetFileChurnMap was served by the git-log fast
  // path; empty when it fell back to go-git (we don't pay extra
  // object lookups for the author in the fallback).
  string top_author = 7;
}

message GetFileChurnMapResponse {
  repeated FileChurn files = 1;
  // Oldest commit reachable from ref (first_commit_timestamp) and
  // newest (last_commit_timestamp). The client uses these as the
  // slider's outer bounds so "all history" spans from the repo's
  // initial commit — file.last_modified alone would clip the range
  // to the oldest surviving file's last touch.
  int64 first_commit_timestamp = 2;
  int64 last_commit_timestamp = 3;
  // Number of commits actually aggregated for this response, and
  // whether the server's per-request cap was hit (meaning older
  // commits in the requested window were skipped). Surfaced so the
  // client can label the stats as "showing last N commits" instead
  // of presenting partial sums as the repo's total truth.
  int32 commits_scanned = 4;
  bool cap_reached = 5;
  int32 max_commits_scanned = 6;
  // Actual timestamp of the oldest commit the server walked for this
  // response. On a capped scan this is newer than since_timestamp in
  // the request; the client uses it to position the slider / since
  // date at the true data boundary so "slider at left" never lies
  // about showing all history while the server silently truncated.
  int64 effective_since_timestamp = 7;
}

// ─── Provider Catalog ─────────────────────────────────────────────────

message GetProviderCatalogRequest {}
message RefreshProviderCatalogRequest {}

message CatalogModel {
  string id = 1;
  string name = 2;
  int64  context_window = 3;
  // Headline pricing. Populated from the authoritative source for this
  // (provider_id, model_id) pair. See PricingQuote for per-source claims.
  double cost_per_1m_in = 4;
  double cost_per_1m_out = 5;
  bool   can_reason = 6;
  bool   supports_images = 7;
  int64  default_max_tokens = 8;
  // IDs of every catalog source that contributed this model entry.
  // One element for single-source models, multiple when merged across
  // sources (e.g. ["catwalk", "openrouter"]).
  repeated string sources = 9;
  // Per-source pricing claims. Populated only when sources disagree on
  // price — callers that just want a single number read cost_per_1m_in/out
  // above. Empty for single-source models or when every source agreed.
  repeated PricingQuote quotes = 10;
}

message PricingQuote {
  string source = 1;
  double cost_per_1m_in = 2;
  double cost_per_1m_out = 3;
}

message CatalogProvider {
  string id = 1;
  string name = 2;
  string type = 3;            // "openai", "anthropic", etc.
  string default_base_url = 4;
  string default_model_id = 5;
  repeated CatalogModel models = 6;
}

message GetProviderCatalogResponse {
  repeated CatalogProvider providers = 1;
}

// ─── LLM Profiles ─────────────────────────────────────────────────────

message LLMProfile {
  string id = 1;
  string name = 2;
  string backend = 3;
  string base_url = 4;
  string model = 5;
  string api_key = 6;     // masked in list responses, plaintext in save requests
  string temperature = 7;
  string max_tokens = 8;
  string system_prompt = 9; // appended to base system prompt when profile is active
}

message ListProfilesRequest {}
message ListProfilesResponse {
  repeated LLMProfile profiles = 1;
  string active_profile_id = 2;
}

message SaveProfileRequest { LLMProfile profile = 1; }
message SaveProfileResponse { string id = 1; }

message DeleteProfileRequest { string id = 1; }
message DeleteProfileResponse {}

message ActivateProfileRequest { string id = 1; }
message ActivateProfileResponse {}

// ─── Local Endpoint Discovery ─────────────────────────────────────────

message DiscoverLocalEndpointsRequest {}

message LocalEndpoint {
  string url = 1;
  string name = 2;
  repeated string models = 3;
}

message DiscoverLocalEndpointsResponse {
  repeated LocalEndpoint endpoints = 1;
}

// ─── Model Discovery ──────────────────────────────────────────────────

message DiscoverModelsRequest {
  string base_url = 1;
  string api_key = 2;
}

message DiscoverModelsResponse {
  repeated string model_ids = 1;
  string provider_name = 2;
  string error = 3;
}

