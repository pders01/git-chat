version: v2
managed:
  enabled: true
plugins:
  - remote: buf.build/protocolbuffers/go
    out: gen/go
    opt: paths=source_relative
  - remote: buf.build/connectrpc/go
    out: gen/go
    opt: paths=source_relative
  # protoc-gen-es v2 generates BOTH messages and service definitions into
  # a single _pb.ts file. The old connectrpc/es plugin is deprecated and
  # generates broken import paths when paired with es v2 output.
  # TS codegen lives in the sibling @pders01/chatworks package, which owns
  # the typed Connect-RPC client surface. git-chat/web consumes it via the
  # `@pders01/chatworks/proto/*` exports. The package is linked through
  # web/package.json's file: dependency.
  - remote: buf.build/bufbuild/es
    out: ../chatworks/src/gen
    opt:
      - target=ts
      - import_extension=js
