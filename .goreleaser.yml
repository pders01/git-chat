version: 2

before:
  hooks:
    - cmd: cd web && bun install --frozen-lockfile && bun run build
      env:
        - NODE_ENV=production

builds:
  - id: git-chat
    main: ./cmd/git-chat
    binary: git-chat
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: pders01
    name: git-chat
  draft: true
  prerelease: auto
