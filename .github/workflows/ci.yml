name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Go vet + test
        run: |
          go vet ./...
          go test ./...

      - name: Web check (tsc + oxlint + oxfmt)
        run: make check-web

      - name: Build binary
        run: make all

      - name: Proto freshness
        run: |
          make proto
          git diff --exit-code gen/ web/src/gen/ || {
            echo "Generated code is stale — run 'make proto' locally and commit"
            exit 1
          }

  e2e:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - uses: oven-sh/setup-bun@v2

      - name: Install Playwright
        run: cd web && bun install --frozen-lockfile && bunx playwright install --with-deps chromium

      - name: Run e2e tests
        run: make test-e2e
