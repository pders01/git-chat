name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - uses: bufbuild/buf-action@v1
        with:
          setup_only: true

      - name: Go vet + test
        run: |
          go vet ./...
          go test ./...

      - name: Web check (tsc + oxlint + oxfmt)
        run: make check-web

      - name: Build binary
        run: make all

      - name: Proto freshness
        run: |
          make proto
          git diff --exit-code gen/ web/src/gen/ || {
            echo "Generated code is stale — run 'make proto' locally and commit"
            exit 1
          }

  e2e:
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history needed for e2e tests to have commits to display
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            web/node_modules
            ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('web/bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Install Playwright
        run: |
          cd web
          bun install --frozen-lockfile
          bunx playwright install chromium

      - name: Run e2e tests
        run: cd web && bunx playwright test --project=desktop --workers=1
        env:
          # Increase timeouts for CI environment
          PLAYWRIGHT_TIMEOUT: 60000
          PLAYWRIGHT_EXPECT_TIMEOUT: 30000
          PLAYWRIGHT_ACTION_TIMEOUT: 30000
          PLAYWRIGHT_NAVIGATION_TIMEOUT: 30000

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            web/playwright-report/
            web/test-results/
          retention-days: 7
