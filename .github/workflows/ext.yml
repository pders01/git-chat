name: Extension

on:
  push:
    branches: [main]
    paths:
      - "extension/**"
      - ".github/workflows/ext.yml"
  pull_request:
    paths:
      - "extension/**"
      - ".github/workflows/ext.yml"
  workflow_dispatch:

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Cache extension dependencies
        uses: actions/cache@v4
        with:
          path: |
            extension/node_modules
            ~/.bun/install/cache
          key: bun-ext-${{ runner.os }}-${{ hashFiles('extension/bun.lock') }}
          restore-keys: |
            bun-ext-${{ runner.os }}-

      - name: Install
        working-directory: extension
        run: bun install --frozen-lockfile

      - name: Typecheck
        working-directory: extension
        run: bun run check

      - name: Bundle
        working-directory: extension
        run: bun run build

      - name: Package
        working-directory: extension
        run: bun run package

      - uses: actions/upload-artifact@v4
        with:
          name: git-chat-vsix
          path: extension/git-chat.vsix
          if-no-files-found: error
          retention-days: 30
